name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          # Full history needed so generate-skill-pages.js can derive
          # lastUpdated + changelog from git log of _skills-vendor/.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Runs unit tests + the end-to-end link checks (scripts/links.test.js),
      # which build the site with the production baseUrl and fail on broken
      # paths (double slashes, missing /prompt_library prefix, dead links).
      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          commit_message: ${{ github.event.head_commit.message }} 